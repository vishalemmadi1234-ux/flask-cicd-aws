name: Dcoker Flask CI/CD
on:
    push:
        branches:[ main ]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: Build Docker image
          run: docker build -t flask-app .
        - name: Run tests in Docker
          run: docker run flask-app python -m pytest tests/ -v
          
